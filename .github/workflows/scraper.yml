name: Run News Pulse Scraper

on:
  schedule:
    - cron: '0 * * * *' # Runs automatically at the start of every hour
  workflow_dispatch: # This allows you to manually press a button on GitHub to test it anytime!

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Run Scraper Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd scraper
          python main.py
