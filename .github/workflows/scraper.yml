name: Run News Pulse Scraper

on:
  schedule:
    - cron: '0 * * * *'
  repository_dispatch:
    types: [trigger-scraper]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # Cache pip downloads so HDBSCAN doesn't recompile on every run
      - name: Cache Python Dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scraper/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install C/C++ build tools only when cache misses (first run or requirements change)
      - name: Install System Build Dependencies (On Cache Miss)
        if: steps.cache-pip.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Install Dependencies
        run: |
          cd scraper
          # 1. Upgrade core package managers
          python -m pip install --upgrade pip setuptools wheel
          # 2. Pre-install compilation prerequisites explicitly
          pip install Cython "numpy>=1.20.0" "scikit-learn==1.5.2"
          # 3. Now safely install the rest (including hdbscan)
          pip install -r requirements.txt

      - name: Run Scraper Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd scraper
          python main.py